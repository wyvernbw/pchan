[package]
name = "pchan"
version = "0.1.0"
edition = "2024"

[dependencies]
pchan-macros = { workspace = true }
pchan-utils = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
const-hex = { workspace = true, features = ["alloc"] }
bstr = "1.12.1"

[workspace]
resolver = "3"
members = [
  "pchan-emu",
  "pchan-macros",
  "pchan-utils",
  "pchan-debug-tui", "pchan-gpu", "pchan-dbg",
]

[workspace.dependencies]
const-hex = { version = "1.17.0", features = ["nightly", "portable-simd"] }
pchan-macros = { path = "./pchan-macros"}
pchan-utils = { path = "./pchan-utils"}
pchan-emu = { path = "./pchan-emu" }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.22", features = ["env-filter"] }
color-eyre = "0.6.5"
slab = "0.4.12"

[profile.bench]
debug = true

[profile.release]
panic = "unwind"
lto = "thin"

[profile.dev]
panic = "unwind"


