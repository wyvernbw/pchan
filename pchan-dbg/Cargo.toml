[package]
name = "pchan-dbg"
version = "0.1.0"
edition = "2024"

[dependencies]
pchan-emu = { workspace = true, features = ["fetch-channel"] }
pchan-utils.workspace = true
color-eyre.workspace = true
mana-tui = { git = "https://github.com/wyvernbw/mana-tui.git", version = "0.0.1", features = ["macros", "nightly"] }
mana-tui-elemental = { git = "https://github.com/wyvernbw/mana-tui.git", version = "0.0.1", features = ["nightly"] }
mana-tui-macros = { git = "https://github.com/wyvernbw/mana-tui.git", version = "0.1.0" }
mana-tui-potion = { git = "https://github.com/wyvernbw/mana-tui.git", version = "0.1.0" }
ratatui = "0.30.0"
tokio = { version = "1.49.0", features = ["macros", "rt"] }
flume = { version = "0.12.0", default-features = false, features = ["async"] }
im = "15.1.0"
